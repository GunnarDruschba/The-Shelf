<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1a1a2e">
    <title>The Shelf</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a1a2e'/><text y='72' x='50' text-anchor='middle' font-size='60'>📚</text></svg>">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        button {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: 40px;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 16px;
            padding-top: 10px;
        }

        .mode-toggle {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            justify-content: flex-start;
        }

        .mode-btn {
            padding: 8px 16px;
            border: 1px solid #333;
            border-radius: 10px;
            background: #16213e;
            color: #888;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .mode-btn.active {
            background: #4a9eff;
            border-color: #4a9eff;
            color: white;
        }

        .folder-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .folder-tab {
            padding: 10px 18px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #16213e;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .folder-tab.active {
            background: #4a9eff;
            border-color: #4a9eff;
            color: white;
        }

        .folder-tab.add-folder {
            border-style: dashed;
            color: #555;
            font-size: 18px;
            padding: 10px 14px;
        }

        .folder-tab.add-folder:hover {
            border-color: #4a9eff;
            color: #4a9eff;
        }

        .folder-tab.delete-folder {
            border-style: dashed;
            border-color: #552222;
            color: #ff4d4d;
            font-size: 12px;
            padding: 10px 14px;
        }

        .add-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            position: relative;
        }

        .add-bar input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #16213e;
            color: #eee;
            font-size: 16px;
            outline: none;
        }

        .add-bar input:focus {
            border-color: #4a9eff;
        }

        .add-bar button {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            background: #4a9eff;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }

        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #16213e;
            border: 1px solid #333;
            border-radius: 12px;
            margin-top: 4px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .search-results.visible {
            display: block;
        }

        .search-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #222;
        }

        .search-item:last-child { border-bottom: none; }
        .search-item:hover, .search-item:active { background: #1f2f50; }

        .search-item img {
            width: 36px;
            height: 52px;
            object-fit: cover;
            border-radius: 4px;
            background: #333;
        }

        .search-item-info { flex: 1; }
        .search-item-name { font-size: 15px; font-weight: 600; }
        .search-item-meta { font-size: 12px; color: #888; }

        .category-section { margin-bottom: 28px; }

        .category-header {
            cursor: pointer;
            user-select: none;
        }

        .category-header .collapse-icon {
            font-size: 12px;
            transition: transform 0.2s;
        }

        .category-header.collapsed .collapse-icon {
            transform: rotate(-90deg);
        }

        .category-section .show-list.hidden {
            display: none;
        }

        .category-header {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            padding-left: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-header.current { color: #4a9eff; }
        .category-header.towatch { color: #bb86fc; }
        .category-header.upcoming { color: #f0a500; }
        .category-header.finished { color: #6fbf6f; }

        .category-count {
            font-size: 12px;
            font-weight: 500;
            background: #2a2a4a;
            padding: 2px 8px;
            border-radius: 10px;
            color: #888;
        }

        .show-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .show-card {
            background: #16213e;
            border-radius: 16px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .show-poster {
            width: 50px;
            height: 72px;
            object-fit: cover;
            border-radius: 8px;
            background: #333;
            flex-shrink: 0;
        }

        .show-poster.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .show-info { flex: 1; min-width: 0; }

        .show-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .show-episode { font-size: 13px; color: #888; }

        .show-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .status-btn {
            font-size: 11px;
            padding: 4px 8px;
            border-radius: 8px;
            border: 1px solid #333;
            background: none;
            color: #888;
            cursor: pointer;
        }

        .status-btn:hover, .status-btn.active {
            border-color: #4a9eff;
            color: #4a9eff;
        }

        .episode-controls {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .ep-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #2a2a4a;
            color: #eee;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            position: relative;
            z-index: 2;
        }

        .ep-btn.plus { background: #4a9eff; }

        .delete-btn {
            background: #3a1a1a;
            border: 1px solid #552222;
            color: #ff4d4d;
            font-size: 18px;
            cursor: pointer;
            padding: 12px 14px;
            border-radius: 10px;
            flex-shrink: 0;
            font-weight: 600;
            min-width: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            position: relative;
            z-index: 2;
        }

        .empty-state {
            text-align: center;
            color: #555;
            margin-top: 60px;
            font-size: 16px;
            line-height: 1.6;
        }

        .season-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 4px;
        }

        .season-btn {
            background: none;
            border: none;
            color: #4a9eff;
            font-size: 12px;
            cursor: pointer;
            padding: 4px 6px;
        }

        .searching-msg {
            padding: 14px;
            text-align: center;
            color: #888;
            font-size: 14px;
        }

        .manual-add {
            padding: 10px 14px;
            cursor: pointer;
            border-top: 1px solid #333;
            color: #4a9eff;
            font-size: 14px;
            touch-action: manipulation;
        }

        .manual-add:hover { background: #1f2f50; }
    </style>
</head>
<body>
    <h1>📚 The Shelf</h1>

    <div class="mode-toggle" id="modeToggle">
        <button class="mode-btn active" data-mode="shows">📺 Shows</button>
        <button class="mode-btn" data-mode="movies">🎬 Movies</button>
        <button class="mode-btn" data-mode="books">📚 Books</button>
    </div>

    <div class="folder-tabs" id="folderTabs"></div>
    
    <div class="add-bar">
        <input type="text" id="showInput" placeholder="Search for a show..." autocomplete="off">
        <button id="searchBtn">Search</button>
        <div class="search-results" id="searchResults"></div>
    </div>

    <div id="content"></div>

    <script>
        var data = null;
        var storageAvailable = true;

        var defaultData = {
            mode: 'shows',
            shows: {
                folders: [
                    { name: 'Gunnar', items: [] },
                    { name: 'Katie & Gunnar', items: [] }
                ],
                activeFolder: 0
            },
            movies: {
                folders: [
                    { name: 'Gunnar', items: [] },
                    { name: 'Katie & Gunnar', items: [] }
                ],
                activeFolder: 0
            },
            books: {
                folders: [
                    { name: 'Gunnar', items: [] }
                ],
                activeFolder: 0
            }
        };

        try {
            var saved = JSON.parse(localStorage.getItem('trackerDataV4') || 'null');
            if (saved && saved.shows && saved.movies && saved.books) {
                data = saved;
            } else {
                data = JSON.parse(JSON.stringify(defaultData));
            }
        } catch (e) {
            storageAvailable = false;
            data = JSON.parse(JSON.stringify(defaultData));
        }

        // Ensure all folders use 'items' key
        var modes = ['shows', 'movies', 'books'];
        for (var mi = 0; mi < modes.length; mi++) {
            var mkey = modes[mi];
            if (data[mkey] && data[mkey].folders) {
                for (var fi = 0; fi < data[mkey].folders.length; fi++) {
                    var f = data[mkey].folders[fi];
                    if (f.shows && !f.items) { f.items = f.shows; delete f.shows; }
                    if (!f.items) f.items = [];
                }
            }
        }

        function save() {
            try {
                if (storageAvailable) localStorage.setItem('trackerDataV4', JSON.stringify(data));
            } catch (e) {}
        }

        function getModeData() {
            return data[data.mode];
        }

        function getItems() {
            var md = getModeData();
            return md.folders[md.activeFolder].items;
        }

        function getCategories() {
            if (data.mode === 'books') {
                return [
                    { key: 'current', title: 'Currently Reading', icon: '📖', css: 'current' },
                    { key: 'towatch', title: 'To Read', icon: '📋', css: 'towatch' },
                    { key: 'upcoming', title: 'Upcoming', icon: '🕐', css: 'upcoming' },
                    { key: 'finished', title: 'Finished', icon: '✓', css: 'finished' }
                ];
            } else {
                return [
                    { key: 'current', title: 'Currently Watching', icon: '▶', css: 'current' },
                    { key: 'towatch', title: 'To Watch', icon: '📋', css: 'towatch' },
                    { key: 'upcoming', title: 'Upcoming', icon: '🕐', css: 'upcoming' },
                    { key: 'finished', title: 'Finished', icon: '✓', css: 'finished' }
                ];
            }
        }

        function renderModeToggle() {
            var btns = document.querySelectorAll('.mode-btn');
            for (var i = 0; i < btns.length; i++) {
                if (btns[i].getAttribute('data-mode') === data.mode) {
                    btns[i].classList.add('active');
                } else {
                    btns[i].classList.remove('active');
                }
            }
            var input = document.getElementById('showInput');
            if (data.mode === 'shows') input.placeholder = 'Search for a show...';
            else if (data.mode === 'movies') input.placeholder = 'Search for a movie...';
            else input.placeholder = 'Search for a book...';
        }

        function renderTabs() {
            var md = getModeData();
            var html = '';
            for (var i = 0; i < md.folders.length; i++) {
                var active = (i === md.activeFolder) ? ' active' : '';
                html += '<button class="folder-tab' + active + '" data-folder="' + i + '">' + esc(md.folders[i].name) + '</button>';
            }
            html += '<button class="folder-tab add-folder" data-action="add-folder">+</button>';
            if (md.folders.length > 1) {
                html += '<button class="folder-tab delete-folder" data-action="delete-folder">🗑 Delete "' + esc(md.folders[md.activeFolder].name) + '"</button>';
            }
            document.getElementById('folderTabs').innerHTML = html;
        }

        function renderCategory(cat, itemsList) {
            if (itemsList.length === 0) return '';
            var isShows = (data.mode === 'shows');
            var html = '<div class="category-section">';
            var collapseState = getCollapseState(cat.key);
            var collapsedClass = collapseState ? ' collapsed' : '';
            var hiddenClass = collapseState ? ' hidden' : '';
            html += '<div class="category-header ' + cat.css + collapsedClass + '" data-collapse="' + cat.key + '"><span class="collapse-icon">▼</span> ' + cat.icon + ' ' + cat.title + '<span class="category-count">' + itemsList.length + '</span></div>';
            html += '<div class="show-list' + hiddenClass + '">';
            for (var j = 0; j < itemsList.length; j++) {
                var idx = itemsList[j].idx;
                var item = itemsList[j].item;
                var posterHtml = '';
                if (item.image) {
                    posterHtml = '<img class="show-poster" src="' + item.image + '" alt="">';
                } else {
                    var emoji = data.mode === 'shows' ? '📺' : (data.mode === 'movies' ? '🎬' : '📚');
                    posterHtml = '<div class="show-poster placeholder">' + emoji + '</div>';
                }

                var detailHtml = '';
                if (isShows) {
                    detailHtml = '<div class="show-episode">S' + item.season + ' · E' + item.episode + '</div>' +
                        '<div class="season-row">' +
                            '<button class="season-btn" data-action="season-down" data-idx="' + idx + '">◀ Season</button>' +
                            '<button class="season-btn" data-action="season-up" data-idx="' + idx + '">Season ▶</button>' +
                        '</div>';
                } else if (item.author) {
                    detailHtml = '<div class="show-episode">' + esc(item.author) + '</div>';
                } else if (item.year) {
                    detailHtml = '<div class="show-episode">' + item.year + '</div>';
                }

                var controlsHtml = '';
                if (isShows) {
                    controlsHtml = '<div class="episode-controls">' +
                        '<button class="ep-btn" data-action="ep-down" data-idx="' + idx + '">−</button>' +
                        '<button class="ep-btn plus" data-action="ep-up" data-idx="' + idx + '">+</button>' +
                    '</div>';
                }

                html += '<div class="show-card" data-idx="' + idx + '">' +
                    posterHtml +
                    '<div class="show-info">' +
                        '<div class="show-name">' + esc(item.name) + '</div>' +
                        detailHtml +
                        '<div class="show-actions">' + statusButtons(idx, item.status) + '</div>' +
                    '</div>' +
                    controlsHtml +
                    '<button class="delete-btn" data-action="delete" data-idx="' + idx + '">✕</button>' +
                '</div>';
            }
            html += '</div></div>';
            return html;
        }

        function statusButtons(idx, current) {
            var cats = getCategories();
            var html = '';
            for (var s = 0; s < cats.length; s++) {
                var active = (cats[s].key === current) ? ' active' : '';
                html += '<button class="status-btn' + active + '" data-action="status" data-idx="' + idx + '" data-status="' + cats[s].key + '">' + cats[s].title + '</button>';
            }
            return html;
        }

        function render() {
            renderModeToggle();
            renderTabs();
            var items = getItems();
            var content = document.getElementById('content');
            var cats = getCategories();
            var typeLabel = data.mode === 'shows' ? 'shows' : (data.mode === 'movies' ? 'movies' : 'books');

            if (items.length === 0) {
                content.innerHTML = '<div class="empty-state">No ' + typeLabel + ' in this folder yet.<br>Search above to add one! 🍿</div>';
                return;
            }

            var grouped = {};
            for (var c = 0; c < cats.length; c++) grouped[cats[c].key] = [];

            for (var i = 0; i < items.length; i++) {
                var bucket = items[i].status || 'current';
                if (!grouped[bucket]) grouped[bucket] = [];
                grouped[bucket].push({ idx: i, item: items[i] });
            }

            // Sort alphabetically within each category
            for (var c = 0; c < cats.length; c++) {
                grouped[cats[c].key].sort(function(a, b) {
                    return a.item.name.toLowerCase().localeCompare(b.item.name.toLowerCase());
                });
            }

            var html = '';
            for (var c = 0; c < cats.length; c++) {
                html += renderCategory(cats[c], grouped[cats[c].key]);
            }
            content.innerHTML = html;
        }

        // MODE TOGGLE
        document.getElementById('modeToggle').addEventListener('click', function(e) {
            var btn = e.target.closest('[data-mode]');
            if (!btn) return;
            data.mode = btn.getAttribute('data-mode');
            save();
            render();
        });

        // FOLDER TABS
        document.getElementById('folderTabs').addEventListener('click', function(e) {
            var addBtn = e.target.closest('[data-action="add-folder"]');
            if (addBtn) {
                var name = prompt('New folder name:');
                if (name && name.trim()) {
                    var md = getModeData();
                    md.folders.push({ name: name.trim(), items: [] });
                    md.activeFolder = md.folders.length - 1;
                    save();
                    render();
                }
                return;
            }
            var delBtn = e.target.closest('[data-action="delete-folder"]');
            if (delBtn) {
                var md = getModeData();
                var folderName = md.folders[md.activeFolder].name;
                var count = md.folders[md.activeFolder].items.length;
                var msg = 'Delete folder "' + folderName + '"?';
                if (count > 0) msg += '\n\nThis will remove ' + count + ' item(s) in it.';
                if (confirm(msg)) {
                    md.folders.splice(md.activeFolder, 1);
                    md.activeFolder = 0;
                    save();
                    render();
                }
                return;
            }
            var tab = e.target.closest('[data-folder]');
            if (!tab) return;
            getModeData().activeFolder = parseInt(tab.getAttribute('data-folder'), 10);
            save();
            render();
        });

        // ITEM ACTIONS
        document.getElementById('content').addEventListener('click', function(e) {
            var btn = e.target.closest('[data-action]');
            if (!btn) return;
            e.preventDefault();
            e.stopPropagation();

            var action = btn.getAttribute('data-action');
            var idx = parseInt(btn.getAttribute('data-idx'), 10);
            var items = getItems();

            if (isNaN(idx) || idx < 0 || idx >= items.length) return;

            switch (action) {
                case 'ep-up': items[idx].episode++; break;
                case 'ep-down': items[idx].episode = Math.max(1, items[idx].episode - 1); break;
                case 'season-up': items[idx].season++; items[idx].episode = 1; break;
                case 'season-down': items[idx].season = Math.max(1, items[idx].season - 1); items[idx].episode = 1; break;
                case 'status': items[idx].status = btn.getAttribute('data-status'); break;
                case 'delete':
                    if (!confirm('Remove "' + items[idx].name + '"?')) return;
                    items.splice(idx, 1);
                    break;
                default: return;
            }
            save();
            render();
        });

        // SEARCH
        function doSearch() {
            var input = document.getElementById('showInput');
            var query = input.value.trim();
            if (!query) return;

            var results = document.getElementById('searchResults');
            results.innerHTML = '<div class="searching-msg">Searching...</div>';
            results.classList.add('visible');

            if (data.mode === 'shows' || data.mode === 'movies') {
                // TVMaze works for both (supports CORS from file://)
                fetch('https://api.tvmaze.com/search/shows?q=' + encodeURIComponent(query))
                    .then(function(r) { return r.json(); })
                    .then(function(apiData) {
                        var html = '';
                        var items = apiData.slice(0, 5);
                        for (var i = 0; i < items.length; i++) {
                            var s = items[i].show;
                            var img = (s.image && s.image.medium) ? s.image.medium : '';
                            var year = s.premiered ? s.premiered.substring(0, 4) : '';
                            var genres = s.genres ? s.genres.slice(0, 2).join(', ') : '';
                            var meta = [year, genres].filter(Boolean).join(' \u00b7 ');
                            var imgTag = img ? '<img src="' + img + '" alt="">' : '<div style="width:36px;height:52px;background:#333;border-radius:4px;"></div>';
                            html += '<div class="search-item" data-name="' + escAttr(s.name) + '" data-image="' + (img || '') + '" data-year="' + year + '">' +
                                imgTag +
                                '<div class="search-item-info">' +
                                    '<div class="search-item-name">' + esc(s.name) + '</div>' +
                                    '<div class="search-item-meta">' + meta + '</div>' +
                                '</div>' +
                            '</div>';
                        }
                        html += '<div class="manual-add" data-manual="true">+ Add "' + esc(query) + '" manually</div>';
                        results.innerHTML = html;
                    })
                    .catch(function() {
                        results.innerHTML = '<div class="manual-add" data-manual="true">Search failed. Add "' + esc(query) + '" manually?</div>';
                    });
            } else {
                // Books - Open Library (supports CORS from file://)
                fetch('https://openlibrary.org/search.json?q=' + encodeURIComponent(query) + '&limit=5')
                    .then(function(r) { return r.json(); })
                    .then(function(apiData) {
                        var html = '';
                        var docs = apiData.docs || [];
                        for (var i = 0; i < Math.min(docs.length, 5); i++) {
                            var b = docs[i];
                            var img = b.cover_i ? 'https://covers.openlibrary.org/b/id/' + b.cover_i + '-M.jpg' : '';
                            var author = b.author_name ? b.author_name[0] : '';
                            var year = b.first_publish_year || '';
                            var meta = [author, year].filter(Boolean).join(' \u00b7 ');
                            var imgTag = img ? '<img src="' + img + '" alt="">' : '<div style="width:36px;height:52px;background:#333;border-radius:4px;"></div>';
                            html += '<div class="search-item" data-name="' + escAttr(b.title) + '" data-image="' + (img || '') + '" data-author="' + escAttr(author) + '">' +
                                imgTag +
                                '<div class="search-item-info">' +
                                    '<div class="search-item-name">' + esc(b.title) + '</div>' +
                                    '<div class="search-item-meta">' + meta + '</div>' +
                                '</div>' +
                            '</div>';
                        }
                        html += '<div class="manual-add" data-manual="true">+ Add "' + esc(query) + '" manually</div>';
                        results.innerHTML = html;
                    })
                    .catch(function() {
                        results.innerHTML = '<div class="manual-add" data-manual="true">Search failed. Add "' + esc(query) + '" manually?</div>';
                    });
            }
        }

        // SEARCH RESULT CLICKS
        document.getElementById('searchResults').addEventListener('click', function(e) {
            var item = e.target.closest('.search-item');
            var manual = e.target.closest('.manual-add');

            if (item) {
                var name = item.getAttribute('data-name');
                var image = item.getAttribute('data-image') || '';
                var author = item.getAttribute('data-author') || '';
                var year = item.getAttribute('data-year') || '';
                var newItem = { name: name, image: image, status: 'current' };
                if (data.mode === 'shows') {
                    newItem.season = 1;
                    newItem.episode = 1;
                } else if (data.mode === 'books') {
                    newItem.author = author;
                } else {
                    newItem.year = year;
                }
                getItems().unshift(newItem);
                document.getElementById('showInput').value = '';
                document.getElementById('searchResults').classList.remove('visible');
                save();
                render();
            } else if (manual) {
                var input = document.getElementById('showInput');
                var name = input.value.trim();
                if (!name) return;
                var newItem = { name: name, image: '', status: 'current' };
                if (data.mode === 'shows') {
                    newItem.season = 1;
                    newItem.episode = 1;
                }
                getItems().unshift(newItem);
                input.value = '';
                document.getElementById('searchResults').classList.remove('visible');
                save();
                render();
            }
        });

        // COLLAPSE STATE
        function getCollapseState(key) {
            try {
                var states = JSON.parse(localStorage.getItem('shelfCollapsed') || '{}');
                return states[data.mode + '_' + key] || false;
            } catch(e) { return false; }
        }

        function setCollapseState(key, collapsed) {
            try {
                var states = JSON.parse(localStorage.getItem('shelfCollapsed') || '{}');
                states[data.mode + '_' + key] = collapsed;
                localStorage.setItem('shelfCollapsed', JSON.stringify(states));
            } catch(e) {}
        }

        // Category header collapse toggle
        document.getElementById('content').addEventListener('click', function(e) {
            var header = e.target.closest('[data-collapse]');
            if (header) {
                var key = header.getAttribute('data-collapse');
                var isCollapsed = header.classList.contains('collapsed');
                setCollapseState(key, !isCollapsed);
                header.classList.toggle('collapsed');
                var list = header.nextElementSibling;
                if (list) list.classList.toggle('hidden');
                return;
            }
        }, true);

        // UTILITY
        function esc(str) {
            var d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        function escAttr(str) {
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // EVENT LISTENERS
        document.getElementById('searchBtn').addEventListener('click', doSearch);
        document.getElementById('showInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doSearch();
        });
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.add-bar')) {
                document.getElementById('searchResults').classList.remove('visible');
            }
        });

        render();
    </script>
</body>
</html>
